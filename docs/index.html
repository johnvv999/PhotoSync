<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PhotoSync</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1c1c1e;
    --muted: #6b6b70;
    --header-bg: #f2f2f4;
    --border: #e5e5e7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121214;
      --fg: #f2f2f3;
      --muted: #a0a0a5;
      --header-bg: #1e1e21;
      --border: #2c2c2f;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding-bottom: 48px;
  }
  .app-title {
    padding: 24px 20px 16px;
    font-size: 28px;
    font-weight: 700;
  }
  .status {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 16px;
  }
  .city-header {
    position: sticky;
    top: 0;
    background: var(--header-bg);
    padding: 14px 20px;
    font-size: 19px;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
    z-index: 1;
  }
  .photo-card { padding: 0 0 20px; }
  .photo-card img {
    width: 100%;
    display: block;
    background: var(--header-bg);
    min-height: 200px;
  }
  .info-link {
    display: block;
    padding: 8px 20px 0;
    font-size: 15px;
    font-weight: 700;
    color: #1a73e8;
    cursor: pointer;
    background: none;
    border: none;
    text-align: left;
  }
  .info-result {
    display: none;
    padding: 4px 20px 0;
    font-size: 14px;
    color: var(--fg);
  }
  .info-result.visible { display: block; }
</style>
</head>
<body>
<main>
  <div class="app-title">PhotoSync</div>
  <div id="content" class="status">Loading photos…</div>
</main>

<script>
  // --- Configuration ---
  // Restricted Drive API key: Google Cloud Console → APIs & Services → Credentials
  // → Create Credentials → API key. Restrict it to the Google Drive API only, and
  // to this page's HTTP referrer (e.g. "https://<username>.github.io/*"), so a
  // leaked key can only ever list/read files that are already publicly shared.
  const DRIVE_API_KEY = "AIzaSyC8O4kNQlCV0br64HsWZJmm9MnhxD-wPQ8";
  const FOLDER_ID = "13Txwwqyr6e-UnCNbw-ceCXAZhxgPbXLr";

  // Same Gemini API key as the Android app's local.properties (a classic key,
  // not service-account-bound). Newly-created Gemini keys are now mandatorily
  // bound to a service account, which requires an OAuth flow this static page
  // can't use — so a domain-restricted key isn't achievable here. No billing
  // account is attached to this project, so worst case if this leaks is the
  // free-tier quota getting used up, not a charge.
  const GEMINI_API_KEY = "AIzaSyB8AJNDjQdaCpKHLY7TMuvicaS0QfGXkoM";
  const GEMINI_MODEL = "gemini-flash-latest";
  const GEMINI_PROMPT =
    "Briefly describe what's in this photo and identify any recognizable landmark, location, or point of interest, in 2-3 sentences.";

  const contentEl = document.getElementById("content");
  const infoCache = new Map();

  function cityLabelFromName(name) {
    const base = name.replace(/\.[^/.]+$/, "");
    const parts = base.split("_");
    return parts.length >= 3 ? `${parts[1]}, ${parts[0]}` : "Other Photos";
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function fetchImageAsBase64(fileId) {
    const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${DRIVE_API_KEY}`;
    return fetch(url)
      .then((res) => {
        if (!res.ok) throw new Error(`Drive download failed (HTTP ${res.status})`);
        return res.blob();
      })
      .then(
        (blob) =>
          new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result.split(",")[1]);
            reader.onerror = () => reject(reader.error);
            reader.readAsDataURL(blob);
          })
      );
  }

  async function describePhoto(fileId, mimeType) {
    if (!GEMINI_API_KEY || GEMINI_API_KEY === "YOUR_GEMINI_API_KEY_HERE") {
      return "Info isn't configured for this page yet.";
    }
    try {
      const base64Image = await fetchImageAsBase64(fileId);
      const body = {
        contents: [{
          parts: [
            { text: GEMINI_PROMPT },
            { inline_data: { mime_type: mimeType || "image/jpeg", data: base64Image } }
          ]
        }]
      };
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
        { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }
      );
      const data = await res.json();
      if (!res.ok) {
        return `Gemini request failed (${res.status}): ${(data.error && data.error.message) || "unknown error"}`;
      }
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      return text ? text.trim() : "No description returned.";
    } catch (e) {
      return `Couldn't get info: ${e.message}`;
    }
  }

  async function loadPhotos() {
    if (!DRIVE_API_KEY || DRIVE_API_KEY === "YOUR_DRIVE_API_KEY_HERE") {
      contentEl.textContent = "This page isn't configured yet — missing Drive API key.";
      return;
    }

    const url = new URL("https://www.googleapis.com/drive/v3/files");
    url.searchParams.set("q", `'${FOLDER_ID}' in parents and trashed=false and mimeType contains 'image/'`);
    url.searchParams.set("fields", "files(id,name,createdTime,parents,mimeType,trashed)");
    url.searchParams.set("key", DRIVE_API_KEY);
    url.searchParams.set("orderBy", "createdTime");

    let files;
    try {
      const res = await fetch(url);
      if (!res.ok) {
        contentEl.textContent = `Couldn't load photos (HTTP ${res.status}). The folder may not be shared publicly yet.`;
        return;
      }
      const data = await res.json();
      files = (data.files || []).filter(
        (f) => f.trashed !== true &&
               f.mimeType && f.mimeType.startsWith("image/") &&
               (f.parents || []).includes(FOLDER_ID)
      );
    } catch (e) {
      contentEl.textContent = "Couldn't reach Google Drive. Check your connection.";
      return;
    }

    if (files.length === 0) {
      contentEl.textContent = "No photos yet.";
      return;
    }

    files.sort((a, b) => new Date(a.createdTime) - new Date(b.createdTime));

    contentEl.className = "";
    contentEl.innerHTML = "";

    let lastCity = null;
    for (const file of files) {
      const city = cityLabelFromName(file.name);
      if (city !== lastCity) {
        const header = document.createElement("div");
        header.className = "city-header";
        header.textContent = city;
        contentEl.appendChild(header);
        lastCity = city;
      }

      const card = document.createElement("div");
      card.className = "photo-card";

      const img = document.createElement("img");
      img.loading = "lazy";
      img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1000`;
      img.alt = escapeHtml(file.name);
      card.appendChild(img);

      const infoLink = document.createElement("button");
      infoLink.className = "info-link";
      infoLink.type = "button";
      infoLink.textContent = "Info";
      card.appendChild(infoLink);

      const infoResult = document.createElement("div");
      infoResult.className = "info-result";
      card.appendChild(infoResult);

      infoLink.addEventListener("click", async () => {
        const cached = infoCache.get(file.id);
        if (cached) {
          infoResult.classList.toggle("visible");
          return;
        }
        infoResult.classList.add("visible");
        infoResult.textContent = "Loading info…";
        const description = await describePhoto(file.id, file.mimeType);
        infoCache.set(file.id, description);
        infoResult.textContent = description;
      });

      contentEl.appendChild(card);
    }
  }

  loadPhotos();
</script>
</body>
</html>

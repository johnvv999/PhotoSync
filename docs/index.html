<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PhotoSync</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1c1c1e;
    --muted: #6b6b70;
    --header-bg: #f2f2f4;
    --border: #e5e5e7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121214;
      --fg: #f2f2f3;
      --muted: #a0a0a5;
      --header-bg: #1e1e21;
      --border: #2c2c2f;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding-bottom: 48px;
  }
  .app-title {
    padding: 24px 20px 16px;
    font-size: 28px;
    font-weight: 700;
  }
  .status {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 16px;
  }
  .city-header {
    position: sticky;
    top: 0;
    background: var(--header-bg);
    padding: 14px 20px;
    font-size: 19px;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
    z-index: 1;
  }
  .photo-card { padding: 0 0 20px; }
  .photo-card img {
    width: 100%;
    display: block;
    background: var(--header-bg);
    min-height: 200px;
  }
  .link-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 20px 0;
  }
  .info-link, .map-link {
    font-size: 15px;
    font-weight: 700;
    color: #1a73e8;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
  }
  .map-link[disabled] {
    color: var(--muted);
    cursor: default;
  }
  .map-link.retry {
    color: #c77700;
  }
  .info-result {
    display: none;
    padding: 4px 20px 0;
    font-size: 14px;
    color: var(--fg);
  }
  .info-result.visible { display: block; }
  .map-embed {
    display: none;
    width: 100%;
    height: 260px;
    border: 0;
    margin-top: 8px;
  }
  .map-embed.visible { display: block; }
</style>
</head>
<body>
<main>
  <div class="app-title">PhotoSync</div>
  <div id="content" class="status">Loading photos…</div>
</main>

<script>
  // --- Configuration ---
  // Restricted Drive API key: Google Cloud Console → APIs & Services → Credentials
  // → Create Credentials → API key. Restrict it to the Google Drive API only, and
  // to this page's HTTP referrer (e.g. "https://<username>.github.io/*"), so a
  // leaked key can only ever list/read files that are already publicly shared.
  const DRIVE_API_KEY = "AIzaSyC8O4kNQlCV0br64HsWZJmm9MnhxD-wPQ8";
  const FOLDER_ID = "1dg9otHHfIUfgUKzSZrTY8OALakA7n_ua";

  // Gemini calls go through a small Cloudflare Worker proxy (see
  // /cloudflare-worker) instead of hitting the Gemini API directly — the real
  // key lives server-side as a Worker secret, never in this public HTML. A
  // key hardcoded here previously got auto-detected and revoked by Google's
  // leaked-key scanning within hours of being committed.
  const GEMINI_PROXY_URL = "YOUR_WORKER_URL_HERE"; // e.g. https://photosync-gemini-proxy.<your-subdomain>.workers.dev

  const contentEl = document.getElementById("content");
  const infoCache = new Map();
  const gpsCache = new Map();

  /** Parses "Country_City" from this app's own upload naming convention, or null if it doesn't match. */
  function cityLabelFromName(name) {
    const base = name.replace(/\.[^/.]+$/, "");
    const parts = base.split("_");
    return parts.length >= 3 ? `${parts[1]}, ${parts[0]}` : null;
  }

  // OpenStreetMap Nominatim's usage policy caps requests at ~1/second and asks
  // that clients not hammer it — this throttle enforces that spacing globally
  // across all reverse-geocode calls on the page.
  let lastNominatimCallAt = 0;
  async function reverseGeocode(lat, lon) {
    const waitMs = Math.max(0, 1000 - (Date.now() - lastNominatimCallAt));
    if (waitMs > 0) await new Promise((resolve) => setTimeout(resolve, waitMs));
    lastNominatimCallAt = Date.now();

    const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=10`;
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);
    let data;
    try {
      const res = await fetch(url, { signal: controller.signal });
      if (!res.ok) throw new Error(`Nominatim request failed (HTTP ${res.status})`);
      data = await res.json();
    } finally {
      clearTimeout(timeoutId);
    }
    const addr = data.address || {};
    const city = addr.city || addr.town || addr.village || addr.municipality || addr.county;
    const country = addr.country;
    if (city && country) return `${city}, ${country}`;
    return country || null;
  }

  /** City label for a photo: filename convention first, falling back to GPS EXIF + reverse geocoding. */
  async function resolveCityLabel(file) {
    const fromName = cityLabelFromName(file.name);
    if (fromName) return fromName;

    const gpsResult = await getGpsForPhoto(file.id);
    if (!gpsResult.ok || !gpsResult.coords) return "Other Photos";

    try {
      const place = await reverseGeocode(gpsResult.coords.lat, gpsResult.coords.lon);
      return place || "Other Photos";
    } catch (e) {
      return "Other Photos";
    }
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function fetchImageAsBase64(fileId) {
    const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${DRIVE_API_KEY}`;
    return fetch(url)
      .then((res) => {
        if (!res.ok) throw new Error(`Drive download failed (HTTP ${res.status})`);
        return res.blob();
      })
      .then(
        (blob) =>
          new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result.split(",")[1]);
            reader.onerror = () => reject(reader.error);
            reader.readAsDataURL(blob);
          })
      );
  }

  // Fetches just the first 128KB of the file — JPEG EXIF metadata always lives
  // near the start, well before the compressed image data, so there's no need
  // to download the whole photo just to check for a GPS tag. Capped at 10s so a
  // slow/rate-limited request can't hang the whole page's location resolution.
  async function fetchImagePrefix(fileId) {
    const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${DRIVE_API_KEY}`;
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);
    try {
      const res = await fetch(url, { headers: { Range: "bytes=0-131071" }, signal: controller.signal });
      if (!res.ok) throw new Error(`Drive download failed (HTTP ${res.status})`);
      return await res.arrayBuffer();
    } finally {
      clearTimeout(timeoutId);
    }
  }

  /** Reads GPS coordinates from a JPEG's EXIF data, or null if none present. */
  function readExifGps(buffer) {
    const view = new DataView(buffer);
    if (view.byteLength < 4 || view.getUint16(0) !== 0xffd8) return null;

    let offset = 2;
    while (offset + 4 <= view.byteLength) {
      if (view.getUint8(offset) !== 0xff) break;
      const marker = view.getUint8(offset + 1);
      if (marker === 0xd8 || marker === 0x01 || (marker >= 0xd0 && marker <= 0xd7)) {
        offset += 2;
        continue;
      }
      if (marker === 0xd9 || marker === 0xda) break;
      const size = view.getUint16(offset + 2);
      if (marker === 0xe1 && offset + 10 <= view.byteLength) {
        const segStart = offset + 4;
        const isExif =
          view.getUint8(segStart) === 0x45 && view.getUint8(segStart + 1) === 0x78 &&
          view.getUint8(segStart + 2) === 0x69 && view.getUint8(segStart + 3) === 0x66 &&
          view.getUint8(segStart + 4) === 0x00 && view.getUint8(segStart + 5) === 0x00;
        if (isExif) {
          try { return parseExifGps(view, segStart + 6); } catch (e) { return null; }
        }
      }
      offset += 2 + size;
    }
    return null;
  }

  function parseExifGps(view, tiffStart) {
    const little = view.getUint16(tiffStart, false) === 0x4949;
    const u16 = (o) => view.getUint16(o, little);
    const u32 = (o) => view.getUint32(o, little);

    const ifd0Offset = u32(tiffStart + 4);
    let gpsIfdOffset = null;
    const ifd0Count = u16(tiffStart + ifd0Offset);
    for (let i = 0; i < ifd0Count; i++) {
      const entryOffset = tiffStart + ifd0Offset + 2 + i * 12;
      if (u16(entryOffset) === 0x8825) {
        gpsIfdOffset = u32(entryOffset + 8);
        break;
      }
    }
    if (gpsIfdOffset == null) return null;

    const gpsStart = tiffStart + gpsIfdOffset;
    const gpsCount = u16(gpsStart);
    // A real GPS IFD has well under 20 entries — a much larger count means the
    // offset landed somewhere wrong (e.g. truncated/misaligned data), so bail
    // out rather than looping through garbage bytes that might coincidentally
    // look like valid tags.
    if (gpsCount > 32) return null;
    let lat = null, latRef = null, lon = null, lonRef = null;

    const readDms = (valueOffset) => {
      let total = 0;
      for (let j = 0; j < 3; j++) {
        const num = u32(valueOffset + j * 8);
        const den = u32(valueOffset + j * 8 + 4);
        const value = den === 0 ? 0 : num / den;
        total += j === 0 ? value : value / Math.pow(60, j);
      }
      return total;
    };

    for (let i = 0; i < gpsCount; i++) {
      const entryOffset = gpsStart + 2 + i * 12;
      const tag = u16(entryOffset);
      const valueOffset = tiffStart + u32(entryOffset + 8);
      if (tag === 0x0001) latRef = String.fromCharCode(view.getUint8(entryOffset + 8));
      else if (tag === 0x0002) lat = readDms(valueOffset);
      else if (tag === 0x0003) lonRef = String.fromCharCode(view.getUint8(entryOffset + 8));
      else if (tag === 0x0004) lon = readDms(valueOffset);
    }

    if (lat == null || lon == null) return null;
    // (0, 0) — "Null Island", open ocean off West Africa — is the standard
    // signature of a parsing failure or an unset GPS field, not a real photo
    // location. Real EXIF tooling conventionally rejects it rather than
    // reporting a bogus location.
    if (lat === 0 && lon === 0) return null;
    return { lat: latRef === "S" ? -lat : lat, lon: lonRef === "W" ? -lon : lon };
  }

  // Distinguishes "checked, no GPS tag present" from "couldn't check" (network/rate-limit
  // failure) — treating those the same would make a temporary glitch look identical to a
  // photo that genuinely has no location, with no way to tell the two apart or retry.
  async function getGpsForPhoto(fileId) {
    if (gpsCache.has(fileId)) return gpsCache.get(fileId);
    let result;
    try {
      const buffer = await fetchImagePrefix(fileId);
      result = { ok: true, coords: readExifGps(buffer) };
    } catch (e) {
      result = { ok: false };
    }
    if (result.ok) gpsCache.set(fileId, result);
    return result;
  }

  async function describePhoto(fileId, mimeType) {
    if (!GEMINI_PROXY_URL || GEMINI_PROXY_URL === "YOUR_WORKER_URL_HERE") {
      return "Info isn't configured for this page yet.";
    }
    try {
      const base64Image = await fetchImageAsBase64(fileId);
      const res = await fetch(GEMINI_PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mimeType: mimeType || "image/jpeg", data: base64Image }),
      });
      const data = await res.json();
      if (!res.ok) {
        return data.error || `Request failed (${res.status})`;
      }
      return data.text || "No description returned.";
    } catch (e) {
      return `Couldn't get info: ${e.message}`;
    }
  }

  async function loadPhotos() {
    if (!DRIVE_API_KEY || DRIVE_API_KEY === "YOUR_DRIVE_API_KEY_HERE") {
      contentEl.textContent = "This page isn't configured yet — missing Drive API key.";
      return;
    }

    const url = new URL("https://www.googleapis.com/drive/v3/files");
    url.searchParams.set("q", `'${FOLDER_ID}' in parents and trashed=false and mimeType contains 'image/'`);
    url.searchParams.set("fields", "files(id,name,createdTime,parents,mimeType,trashed)");
    url.searchParams.set("key", DRIVE_API_KEY);
    url.searchParams.set("orderBy", "createdTime");

    let files;
    try {
      const res = await fetch(url);
      if (!res.ok) {
        contentEl.textContent = `Couldn't load photos (HTTP ${res.status}). The folder may not be shared publicly yet.`;
        return;
      }
      const data = await res.json();
      files = (data.files || []).filter(
        (f) => f.trashed !== true &&
               f.mimeType && f.mimeType.startsWith("image/") &&
               (f.parents || []).includes(FOLDER_ID)
      );
    } catch (e) {
      contentEl.textContent = "Couldn't reach Google Drive. Check your connection.";
      return;
    }

    if (files.length === 0) {
      contentEl.textContent = "No photos yet.";
      return;
    }

    files.sort((a, b) => new Date(a.createdTime) - new Date(b.createdTime));

    contentEl.textContent = "Resolving photo locations…";
    const cityLabels = [];
    for (const file of files) {
      cityLabels.push(await resolveCityLabel(file));
    }

    contentEl.className = "";
    contentEl.innerHTML = "";

    let lastCity = null;
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const city = cityLabels[i];
      if (city !== lastCity) {
        const header = document.createElement("div");
        header.className = "city-header";
        header.textContent = city;
        contentEl.appendChild(header);
        lastCity = city;
      }

      const card = document.createElement("div");
      card.className = "photo-card";

      const img = document.createElement("img");
      img.loading = "lazy";
      img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1000`;
      img.alt = escapeHtml(file.name);
      card.appendChild(img);

      const linkRow = document.createElement("div");
      linkRow.className = "link-row";
      card.appendChild(linkRow);

      const infoLink = document.createElement("button");
      infoLink.className = "info-link";
      infoLink.type = "button";
      infoLink.textContent = "Info";
      linkRow.appendChild(infoLink);

      const mapLink = document.createElement("button");
      mapLink.className = "map-link";
      mapLink.type = "button";
      mapLink.textContent = "Map";
      mapLink.disabled = true;
      linkRow.appendChild(mapLink);

      const infoResult = document.createElement("div");
      infoResult.className = "info-result";
      card.appendChild(infoResult);

      const mapEmbed = document.createElement("iframe");
      mapEmbed.className = "map-embed";
      mapEmbed.loading = "lazy";
      card.appendChild(mapEmbed);

      infoLink.addEventListener("click", async () => {
        const cached = infoCache.get(file.id);
        if (cached) {
          infoResult.classList.toggle("visible");
          return;
        }
        infoResult.classList.add("visible");
        infoResult.textContent = "Loading info…";
        const description = await describePhoto(file.id, file.mimeType);
        infoCache.set(file.id, description);
        infoResult.textContent = description;
      });

      let mapCoords = null;
      let mapState = "checking"; // "checking" | "found" | "none" | "error"

      async function refreshMapState() {
        const result = await getGpsForPhoto(file.id);
        if (!result.ok) {
          mapState = "error";
          mapLink.disabled = false;
          mapLink.classList.add("retry");
          mapLink.textContent = "Map ⟳";
          return;
        }
        mapLink.classList.remove("retry");
        if (result.coords) {
          mapCoords = result.coords;
          mapState = "found";
          mapLink.disabled = false;
          mapLink.textContent = "Map";
        } else {
          mapState = "none";
          mapLink.disabled = true;
          mapLink.textContent = "Map";
        }
      }

      mapLink.addEventListener("click", () => {
        if (mapState === "error") {
          mapLink.textContent = "Map ⟳ …";
          mapLink.disabled = true;
          mapLink.classList.remove("retry");
          refreshMapState();
          return;
        }
        if (mapState !== "found" || !mapCoords) return;
        if (!mapEmbed.src) {
          mapEmbed.src = `https://maps.google.com/maps?q=${mapCoords.lat},${mapCoords.lon}&z=15&output=embed`;
        }
        mapEmbed.classList.toggle("visible");
      });

      refreshMapState();

      contentEl.appendChild(card);
    }
  }

  loadPhotos();
</script>
</body>
</html>
